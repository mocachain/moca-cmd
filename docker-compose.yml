services:
  cmd:
    container_name: moca-cmd
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    image: "mocachain/moca-cmd:local"
    networks:
      - moca-network
    volumes:
      - "./deployment/dockerup/:/root/.moca-cmd:Z"
    working_dir: "/root/.moca-cmd"
    stdin_open: true
    tty: true
    command: /bin/bash

networks:
  moca-network:
    external: true
