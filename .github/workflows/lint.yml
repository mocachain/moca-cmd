name: Lint
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      lint_scope:
        description: Lint scope to run
        required: true
        default: full
        type: choice
        options:
          - incremental
          - full
permissions:
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  # pull-requests: read
jobs:
  golangci:
    name: golangci-lint
    strategy:
      matrix:
        go-version: [1.23.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: moca-cmd
    env:
      GOPRIVATE: github.com/mocachain
      GONOSUMDB: github.com/mocachain
      GOPROXY: https://proxy.golang.org,direct
      GOTOOLCHAIN: local
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: moca-cmd
      - uses: actions/cache@v4
        with:
          # In order:
          # * Module download cache
          # * Build cache (Linux)
          # * Build cache (Mac)
          # * Build cache (Windows)
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            %LocalAppData%\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('moca-cmd/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Download modules
        run: go mod download
      - name: Determine incremental lint base
        id: lint-base
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.lint_scope == 'incremental' }}
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref="origin/main"
          fi
          echo "base_ref=$(git merge-base HEAD \"$base_ref\")" >> "$GITHUB_OUTPUT"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.64.8
          working-directory: moca-cmd
          skip-pkg-cache: true
          args: --timeout=10m --new-from-rev=${{ steps.lint-base.outputs.base_ref }} --whole-files
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.lint_scope == 'incremental' }}
      - name: golangci-lint full
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.64.8
          working-directory: moca-cmd
          skip-pkg-cache: true
          args: --timeout=15m
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.lint_scope == 'full' }}
