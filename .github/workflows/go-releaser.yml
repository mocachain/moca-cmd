name: goreleaser

on:
  push:
    tags:
      - "v*.*.*"
permissions: read-all

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    defaults:
      run:
        working-directory: moca-cmd
    env:
      GOPRIVATE: github.com/mocachain
      GONOSUMDB: github.com/mocachain
      GOPROXY: https://proxy.golang.org,direct
      GOTOOLCHAIN: local
      GO_TOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          path: moca-cmd
      - name: Checkout moca
        uses: actions/checkout@v4
        with:
          repository: mocachain/moca
          ref: 925b543c3b63bc0ddd99b932fe6914f41b53ce7c
          path: moca
      - name: Checkout moca-go-sdk
        uses: actions/checkout@v4
        with:
          repository: mocachain/moca-go-sdk
          ref: a8cbdd1da3f6fb715cd5fbf998f211ce44a784b7
          path: moca-go-sdk
      - name: Checkout moca-common
        uses: actions/checkout@v4
        with:
          repository: mocachain/moca-common
          ref: 4c8a3ef119043c7bb2a3a3f55911b0993f503fe6
          path: moca-common
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          check-latest: true
      - name: release dry run
        run: make release-dry-run
      - name: setup release environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          echo 'GITHUB_TOKEN=${{secrets.GITHUB_TOKEN}}' > .release-env
      - name: release publish
        run: make release
