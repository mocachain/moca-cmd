name: Build Test

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test:
    strategy:
      matrix:
        go-version: [1.23.x]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: moca-cmd
    env:
      GOPRIVATE: github.com/mocachain
      GONOSUMDB: github.com/mocachain
      GOPROXY: https://proxy.golang.org,direct
      GOTOOLCHAIN: local
      GO_TOOLCHAIN: local
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: moca-cmd

      - name: Checkout moca
        uses: actions/checkout@v4
        with:
          repository: mocachain/moca
          ref: 925b543c3b63bc0ddd99b932fe6914f41b53ce7c
          path: moca

      - name: Checkout moca-go-sdk
        uses: actions/checkout@v4
        with:
          repository: mocachain/moca-go-sdk
          ref: a8cbdd1da3f6fb715cd5fbf998f211ce44a784b7
          path: moca-go-sdk

      - name: Checkout moca-common
        uses: actions/checkout@v4
        with:
          repository: mocachain/moca-common
          ref: 4c8a3ef119043c7bb2a3a3f55911b0993f503fe6
          path: moca-common

      - uses: actions/cache@v4
        with:
          # In order:
          # * Module download cache
          # * Build cache (Linux)
          # * Build cache (Mac)
          # * Build cache (Windows)
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            %LocalAppData%\go-build
          key: ${{ runner.os }}-go-${{ hashFiles('moca-cmd/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Test Build
        run: |
          make build
